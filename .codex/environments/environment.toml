# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "wiremock-kotlin"

[setup]
script = '''
set -e
cd "$CODEX_WORKTREE_PATH"

# Android-target repos ship an idempotent, project-local SDK installer.
if [ -f ./setup-android-sdk.sh ]; then
  bash ./setup-android-sdk.sh
fi

# Warm the Gradle wrapper, JDK toolchain, and plugin cache so the first
# build is fast. --no-daemon avoids leaving an 8 GB daemon per worktree.
if [ -f ./gradlew ]; then
  chmod +x ./gradlew
  ./gradlew --no-daemon help
fi
'''

[cleanup]
script = '''
cd "$CODEX_WORKTREE_PATH" 2>/dev/null || exit 0

# Release Gradle/Kotlin daemon file locks before the worktree is removed.
[ -f ./gradlew ] && ./gradlew --stop || true
'''

[[actions]]
name = "Build"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" 2>/dev/null; ./gradlew assemble"

[[actions]]
name = "Test"
icon = "tool"
command = "cd \"$CODEX_WORKTREE_PATH\" 2>/dev/null; ./gradlew check"
